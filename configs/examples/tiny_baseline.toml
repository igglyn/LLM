# NOTE: This baseline uses chunk patching, so output logits are in compressed
# patch-space (not one position per input byte). It is forward/smoke-valid,
# but not valid for the default byte-level next-token CE objective without an
# explicit target-mapping rule.
[data]
dataset = "byte_dataset"
batch_size = 8
seq_len = 128

[model.codec]
name = "identity"

[model.patcher1]
name = "chunk"

[model.mixer]
name = "transformer"

[model.head]
name = "byte"

[train]
steps = 50
lr = 0.001
seed = 42
