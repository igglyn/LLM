# Tiny context pyramid example.
# Uses mixed-resolution memory: low-res history + recent high-res context.

[data]
dataset = "byte_dataset"
batch_size = 4
seq_len = 64

[model.codec]
name = "identity"

[model.patcher1]
name = "chunk"
patch_size = 8
d_model = 16

[model.patcher2]
name = "hidden_chunk"
patch_size = 2
d_model = 16
use_mlp = false

[[model.mixers]]
name = "transformer"
d_model = 16
n_heads = 4
n_layers = 1

[model.memory]
name = "context_pyramid"
keep_recent_tokens = 4
keep_lowres_history = 8
lowres_source = "patcher2"

[model.head]
name = "byte"
d_model = 16

[train]
steps = 10
lr = 0.001
seed = 42
preserve_memory_across_batches = true
reset_memory_on_document_boundary = false
truncate_bptt_segments = 16
