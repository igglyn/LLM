tokenizer:
  add_bos: true
  add_eos: true

data:
  raw_path: data/raw
  pattern: "*.txt"
  processed_dir: data/processed
  processed_dir_patcher: data/processed/patcher
  processed_dir_patcher2: data/processed/patcher2
  processed_dir_tiny: data/processed/tiny
  train_split: 0.95

model:
  seq_len: 256
  d_model: 384
  pos_encoding: learned
  n_layers: 6
  n_heads: 6
  dropout: 0.1
  grad_checkpointing: false
  flash_attention: true

patcher:
  patch_size: 1
  latent_dim: 384
  pos_encoding: learned
  encoder_layers: 2
  decoder_layers: 2
  n_heads: 6
  dropout: 0.1
  grad_checkpointing: false
  flash_attention: true
  block_attention: false
  block_size: 8
  pretrained_path: ""


patcher2:
  enabled: true
  patch_size: 2
  latent_dim: 384
  pos_encoding: learned
  encoder_layers: 2
  decoder_layers: 2
  n_heads: 6
  dropout: 0.1
  grad_checkpointing: false
  flash_attention: true
  block_attention: false
  block_size: 8
  pretrained_path: ""

patcher2_train:
  seq_len_tokens: 1024
  batch_size: 8
  max_steps: 3000
  eval_every: 100
  eval_batches: 50
  save_every: 200
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  out_dir: outputs/patcher2
  amp_enabled: true
  amp_dtype: float16

patcher_train:
  seq_len_tokens: 1024
  batch_size: 8
  max_steps: 3000
  eval_every: 100
  eval_batches: 50
  save_every: 200
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  lr_reduce_threshold: 0.05
  lr_reduce_factor: 0.5
  lr_reduce_threshold_2: 0.03
  lr_reduce_factor_2: 0.5
  lr_min: 0.000001
  out_dir: outputs/patcher
  amp_enabled: true
  amp_dtype: float16

train:
  seed: 42
  batch_size: 8
  grad_accum_steps: 4
  max_steps: 15000
  eval_every: 100
  eval_batches: 50
  save_every: 200
  lr_max: 0.0003
  lr_min: 0.00003
  lr_reduce_threshold: 2.0
  lr_reduce_factor: 0.5
  lr_reduce_threshold_2: 1.5
  lr_reduce_factor_2: 0.5
  warmup_steps: 1000
  weight_decay: 0.1
  grad_clip: 1.0
  amp_enabled: true
  amp_dtype: float16
  out_dir: outputs

sample:
  temperature: 0.9
  top_k: 40
  max_new_patches: 128
